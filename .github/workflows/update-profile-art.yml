name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
        
      - name: Fetch daily contribution data
        run: python scripts/fetch_contributions.py Gaurav-205
        
      - name: Render animated contribution heatmap
        run: python scripts/render_heatmap_svg.py data/contributions.json contrib-heatmap.svg
        
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
