<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 360" width="490" height="360">
  <style>
    .window-bg {
      fill: #0d1117; /* Dark theme default */
      stroke: #30363d;
      stroke-width: 1.5;
    }
    .title-text {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      fill: #8b949e;
      text-anchor: middle;
    }
    .term-text {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .header-user {
      fill: #58a6ff; /* blue */
      font-weight: bold;
    }
    .header-host {
      fill: #58a6ff;
    }
    .header-at {
      fill: #8b949e;
    }
    .separator {
      fill: #21262d;
    }
    .key-color {
      fill: #58a6ff;
      font-weight: bold;
    }
    .val-color {
      fill: #c9d1d9;
    }
    /* Color blocks */
    .c-black { fill: #161b22; }
    .c-red { fill: #f85149; }
    .c-green { fill: #39d353; }
    .c-yellow { fill: #f2cc60; }
    .c-blue { fill: #58a6ff; }
    .c-magenta { fill: #bc8cff; }
    .c-cyan { fill: #39c5cf; }
    .c-white { fill: #ffffff; stroke: #30363d; stroke-width: 0.5; }
    @media (prefers-color-scheme: light) {
      .window-bg {
        fill: #ffffff;
        stroke: #d0d7de;
      }
      .title-text {
        fill: #57606a;
      }
      .header-user {
        fill: #0969da; /* dark blue */
      }
      .header-host {
        fill: #0969da;
      }
      .header-at {
        fill: #57606a;
      }
      .separator {
        fill: #d0d7de;
      }
      .key-color {
        fill: #0969da;
      }
      .val-color {
        fill: #24292f;
      }
      .c-black { fill: #f6f8fa; }
      .c-red { fill: #cf222e; }
      .c-green { fill: #1a7f37; }
      .c-yellow { fill: #9a6700; }
      .c-blue { fill: #0969da; }
      .c-magenta { fill: #8250df; }
      .c-cyan { fill: #1f6feb; }
      .c-white { fill: #24292f; stroke: none; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .anim-fade {
      opacity: 0;
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .delay-0 { animation-delay: 0.10s; }
    .delay-1 { animation-delay: 0.18s; }
    .delay-2 { animation-delay: 0.26s; }
    .delay-3 { animation-delay: 0.34s; }
    .delay-4 { animation-delay: 0.42s; }
    .delay-5 { animation-delay: 0.50s; }
    .delay-6 { animation-delay: 0.58s; }
    .delay-7 { animation-delay: 0.66s; }
    .delay-8 { animation-delay: 0.74s; }
    .delay-9 { animation-delay: 0.82s; }
    .delay-10 { animation-delay: 0.90s; }
    .delay-11 { animation-delay: 0.98s; }
    .delay-12 { animation-delay: 1.06s; }
    .delay-13 { animation-delay: 1.14s; }

  </style>
  <!-- Terminal Frame -->
  <rect class="window-bg" x="1.5" y="1.5" width="487" height="357" rx="8" ry="8" />
  <!-- Terminal Header -->
  <circle cx="20" cy="20" r="5.5" fill="#ff5f56" />
  <circle cx="36" cy="20" r="5.5" fill="#ffbd2e" />
  <circle cx="52" cy="20" r="5.5" fill="#27c93f" />
  <text class="title-text" x="245" y="24">Gaurav-205@github</text>
  <!-- Neofetch content -->
  <g class="anim-fade delay-0 term-text">
    <text x="20" y="58">
      <tspan class="header-user">Gaurav-205</tspan>
      <tspan class="header-at">@</tspan>
      <tspan class="header-host">github</tspan>
    </text>
  </g>
  <g class="anim-fade delay-1 term-text">
    <text x="20" y="68" class="separator">-----------------</text>
  </g>
  <g class="anim-fade delay-2 term-text">
    <text x="20" y="84">
      <tspan class="key-color">OS</tspan>
      <tspan class="val-color">: Ubuntu 22.04 LTS x86_64</tspan>
    </text>
  </g>
  <g class="anim-fade delay-3 term-text">
    <text x="20" y="105">
      <tspan class="key-color">Host</tspan>
      <tspan class="val-color">: GitHub Profile Profile-v2</tspan>
    </text>
  </g>
  <g class="anim-fade delay-4 term-text">
    <text x="20" y="126">
      <tspan class="key-color">Kernel</tspan>
      <tspan class="val-color">: Python 3.14.2 & Node.js</tspan>
    </text>
  </g>
  <g class="anim-fade delay-5 term-text">
    <text x="20" y="147">
      <tspan class="key-color">Uptime</tspan>
      <tspan class="val-color">: 100% active, always learning</tspan>
    </text>
  </g>
  <g class="anim-fade delay-6 term-text">
    <text x="20" y="168">
      <tspan class="key-color">Shell</tspan>
      <tspan class="val-color">: zsh / powershell</tspan>
    </text>
  </g>
  <g class="anim-fade delay-7 term-text">
    <text x="20" y="189">
      <tspan class="key-color">Terminal</tspan>
      <tspan class="val-color">: SVG Canvas v1.0.3</tspan>
    </text>
  </g>
  <g class="anim-fade delay-8 term-text">
    <text x="20" y="210">
      <tspan class="key-color">Now</tspan>
      <tspan class="val-color">: Designing high-scale backends & AI agent</tspan>
    </text>
    <text x="20" y="225">
      <tspan class="val-color">     systems</tspan>
    </text>
  </g>
  <g class="anim-fade delay-9 term-text">
    <text x="20" y="246">
      <tspan class="key-color">Prev</tspan>
      <tspan class="val-color">: Nova Career platform, subscription &</tspan>
    </text>
    <text x="20" y="261">
      <tspan class="val-color">      billing pipelines</tspan>
    </text>
  </g>
  <g class="anim-fade delay-10 term-text">
    <text x="20" y="282">
      <tspan class="key-color">Stack</tspan>
      <tspan class="val-color">: Python, TypeScript, React, PostgreSQL,</tspan>
    </text>
    <text x="20" y="297">
      <tspan class="val-color">       Docker, AWS</tspan>
    </text>
  </g>
  <g class="anim-fade delay-11 term-text">
    <text x="20" y="318">
      <tspan class="key-color">Highlights</tspan>
      <tspan class="val-color">: Full-stack optimizations, automated</tspan>
    </text>
    <text x="20" y="333">
      <tspan class="val-color">            testing, WCAG 2.1 AA</tspan>
    </text>
  </g>
  <!-- ANSI Color Blocks -->
  <g class="anim-fade delay-12">
    <rect class="c-black" x="20" y="359" width="18" height="14" rx="2" />
    <rect class="c-red" x="44" y="359" width="18" height="14" rx="2" />
    <rect class="c-green" x="68" y="359" width="18" height="14" rx="2" />
    <rect class="c-yellow" x="92" y="359" width="18" height="14" rx="2" />
    <rect class="c-blue" x="116" y="359" width="18" height="14" rx="2" />
    <rect class="c-magenta" x="140" y="359" width="18" height="14" rx="2" />
    <rect class="c-cyan" x="164" y="359" width="18" height="14" rx="2" />
    <rect class="c-white" x="188" y="359" width="18" height="14" rx="2" />
  </g>
</svg>